// Use localStorage when available (GitHub Pages), fall back to window.storage (artifact)
const sessionStore = {
  get: async (key) => {
    try { return localStorage.getItem(key); } catch {
      try { const r = await window.storage.get(key); return r?.value || null; } catch { return null; }
    }
  },
  set: async (key, val) => {
    try { localStorage.setItem(key, val); return; } catch {}
    try { await window.storage.set(key, val); } catch {}
  },
  remove: async (key) => {
    try { localStorage.removeItem(key); return; } catch {}
    try { await window.storage.delete(key); } catch {}
  }
};

const sbFetch = async (path, options = {}, token = null) => {
  const res = await fetch(`${SB_URL}${path}`, {
    ...options,
    headers: {
      'apikey': SB_KEY,
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
      ...(options.headers || {}),
    },
  });
  const text = await res.text();
  return { ok: res.ok, status: res.status, data: text ? JSON.parse(text) : null };
};

// Auth helpers
const sbSignUp = async (email, password) => {
  const r = await sbFetch('/auth/v1/signup', {
    method: 'POST', body: JSON.stringify({ email, password })
  });
  if (!r.ok) {
    const msg = (r.data?.error_description || r.data?.message || r.data?.code || '').toLowerCase();
    if (msg.includes('already') || msg.includes('registered') || msg.includes('exists'))
      throw new Error('This email is already registered. Please sign in instead.');
    if (msg.includes('email'))
      throw new Error('Please enter a valid email address.');
    if (msg.includes('password'))
      throw new Error('Password must be at least 6 characters.');
    throw new Error('Could not create account. Please check your details and try again.');
  }
  return r.data;
};

const sbSignIn = async (email, password) => {
  const r = await sbFetch('/auth/v1/token?grant_type=password', {
    method: 'POST', body: JSON.stringify({ email, password })
  });
  if (!r.ok) {
    const msg = (r.data?.error_description || r.data?.message || '').toLowerCase();
    if (msg.includes('invalid') || msg.includes('credentials') || r.status === 400 || r.status === 401)
      throw new Error('Incorrect email or password. Please try again.');
    if (msg.includes('email not confirmed'))
      throw new Error('Please confirm your email address before signing in.');
    if (msg.includes('too many'))
      throw new Error('Too many attempts. Please wait a moment and try again.');
    throw new Error('Sign in failed. Please check your connection and try again.');
  }
  return r.data;
};

const sbSignOut = async (token) => {
  await sbFetch('/auth/v1/logout', { method: 'POST' }, token);
};

const sbRefreshToken = async (refreshToken) => {
  const r = await sbFetch('/auth/v1/token?grant_type=refresh_token', {
    method: 'POST', body: JSON.stringify({ refresh_token: refreshToken })
  });
  if (!r.ok) return null;
  return r.data;
};

// Data helpers
const sbLoad = async (table, token) => {
  if (token === 'demo') return [];
  try {
    const r = await sbFetch(`/rest/v1/${table}?select=data`, {}, token);
    return r.data?.[0]?.data || [];
  } catch { return []; }
};

const sbSave = async (table, userId, token, value) => {
  // In demo/artifact mode — persist to window.storage
  if (token === 'demo') {
    try { await window.storage.set(`bp_${table}`, JSON.stringify(value)); } catch {}
    return;
  }
  if (!userId || !token) return;
  try {
    const patch = await sbFetch(`/rest/v1/${table}?user_id=eq.${userId}`, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=representation' },
      body: JSON.stringify({ data: value })
    }, token);
    if (!patch.data || patch.data.length === 0) {
      await sbFetch(`/rest/v1/${table}`, {
        method: 'POST',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify({ user_id: userId, data: value })
      }, token);
    }
  } catch(e) { console.error('sbSave error', e); }
};

const GroupedBarChart = ({ data }) => {

            </div>

const LineChartTrend = ({ data }) => {
  const max = Math.max(...data.flatMap(d=>[d.income||0,d.expense||0]),100);
  const W=300,H=150,P=20;
  const gx=(i)=>(i*(W-P*2))/(Math.max(data.length-1,1))+P;
  const gy=(v)=>H-(v/max)*(H-P*2)-P;
  const path=(k)=>data.map((d,i)=>`${i===0?'M':'L'} ${gx(i)} ${gy(d[k]||0)}`).join(' ');
  return (
    <div className="w-full space-y-4 animate-in fade-in duration-500">
      <div className="h-40 w-full pt-4">
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full overflow-visible">
          {[0,.25,.5,.75,1].map((p,i)=><line key={i} x1={P} y1={gy(max*p)} x2={W-P} y2={gy(max*p)} stroke="#f1f5f9" strokeWidth="1"/>)}
          <path d={path('income')} fill="none" stroke="#10b981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
          {data.map((d,i)=><circle key={`i${i}`} cx={gx(i)} cy={gy(d.income||0)} r="3.5" fill="white" stroke="#10b981" strokeWidth="2"/>)}
          <path d={path('expense')} fill="none" stroke="#f43f5e" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
          {data.map((d,i)=><circle key={`e${i}`} cx={gx(i)} cy={gy(d.expense||0)} r="3.5" fill="white" stroke="#f43f5e" strokeWidth="2"/>)}
        </svg>
      </div>
      <div className="flex justify-between px-2">
        {data.map((item,i)=><span key={i} className="text-[8px] font-black text-slate-400 uppercase tracking-tighter">{item.label}</span>)}
      </div>
      <ChartLegend/>
    </div>
  );
};

  // ── Derive display state from raw storage lists ────────────────────────────
  const applyAccounts = useCallback((accList) => {
    const hidden  = accList.filter(a=>a.hidden).map(a=>a.id);
    const active  = accList.filter(a=>!a.hidden);
    const obj = {};
    active.forEach(a => { obj[a.id]={initialBalance:a.initialBalance||0, description:a.description||'', currentBalance:a.currentBalance||0, icon:a.icon||'Wallet', color:a.color||'indigo-600'}; });

    setCustomAccounts(Array.from(new Set([...DEFAULT_ACCOUNTS,...active.map(a=>a.id)])).filter(n=>!hidden.includes(n)));
  }, []);

  const applyCategories = useCallback((catList) => {
    const hiddenNames = catList.filter(i=>i.hidden).map(i=>i.name);
    // De-duplicate active entries by name — last stored entry wins
    const seen = new Set();
    const active = [...catList].reverse().filter(i=>{
      if(i.hidden||seen.has(i.name)) return false;
      seen.add(i.name); return true;
    }).reverse();
    const final = DEFAULT_CATEGORIES.filter(d=>!hiddenNames.includes(d.name));
    active.forEach(c=>{ const idx=final.findIndex(f=>f.name===c.name); if(idx>-1) final[idx]=c; else final.push(c); });
    setCustomCategories(final);
  }, []);

  // ── Auth functions ─────────────────────────────────────────────────────────
  // Safe accessors — return empty string if session is missing (prevents crashes)

    setAuthLoading(false);

  const handleSignUp = async () => {

  // ── PIN helpers ────────────────────────────────────────────────────────────
  const hashPin = (pin) => {
    let h = 0;
    for(let i=0;i<pin.length;i++){ h = ((h<<5)-h)+pin.charCodeAt(i); h|=0; }
    return h.toString(36);
  };

  const pinStore = {
    get: (k) => { try{ return localStorage.getItem(k); }catch{ return null; } },
    set: (k,v) => { try{ localStorage.setItem(k,v); }catch{} },
    del: (k)   => { try{ localStorage.removeItem(k); }catch{} },
  };

  // Load PIN settings on auth
  useEffect(() => {
    if(!authSession) return;
    const uid2 = uid() || 'demo-user';
    const enabled  = pinStore.get(`bp_pin_enabled_${uid2}`) === 'true';
    const fpEnabled= pinStore.get(`bp_fp_enabled_${uid2}`)  === 'true';
    setPinEnabled(enabled);
    setFingerprintEnabled(fpEnabled);
    // Check fingerprint availability
    if(window.PublicKeyCredential) {
      window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable?.()
        .then(avail => setFingerprintAvail(!!avail)).catch(()=>{});
    }
    // If PIN enabled, show lock screen
    if(enabled) setPinLocked(true);

  const handlePinDigit = (digit) => {
    if(pinLockoutUntil && Date.now() < pinLockoutUntil) return;
    if(pinSetupMode) {

        const next = pinInput + digit;
        setPinInput(next);
        if(next.length === 6) { setPinStep('confirm'); setPinInput(''); setPinConfirm(next); setPinError(''); }
      } else {
        const next = pinInput + digit;
        setPinInput(next);
        if(next.length === 6) {
          if(next === pinConfirm) {
            // Save PIN
            const uid2 = uid() || 'demo-user';
            pinStore.set(`bp_pin_${uid2}`, hashPin(next));
            pinStore.set(`bp_pin_enabled_${uid2}`, 'true');
            setPinEnabled(true); setPinSetupMode(false);
            setPinInput(''); setPinConfirm(''); setPinStep('enter'); setPinError('');
          } else {
            setPinError('PINs do not match. Try again.'); setPinInput(''); setPinStep('enter'); setPinConfirm('');
          }
        }
      }
    } else {
      // Unlock
      const next = pinInput + digit;
      setPinInput(next);
      if(next.length === 6) {
        const uid2 = uid() || 'demo-user';
        const stored = pinStore.get(`bp_pin_${uid2}`);
        if(hashPin(next) === stored) {
          setPinLocked(false); setPinInput(''); setPinAttempts(0); setPinError('');
        } else {
          const newAttempts = pinAttempts + 1;
          setPinAttempts(newAttempts); setPinInput('');
          if(newAttempts >= 5) {
            const lockUntil = Date.now() + 30000;
            setPinLockoutUntil(lockUntil);
            setPinError('Too many attempts. Wait 30 seconds.');
            setTimeout(() => { setPinLockoutUntil(null); setPinAttempts(0); setPinError(''); }, 30000);
          } else {
            setPinError(`Incorrect PIN. ${5-newAttempts} attempt${5-newAttempts===1?'':'s'} remaining.`);
          }
        }
      }
    }
  };

  const handlePinDelete = () => {
    setPinInput(p => p.slice(0,-1));
  };

  const handleFingerprintAuth = async () => {
    try {
      const cred = await navigator.credentials.get({
        publicKey: {
          challenge: new Uint8Array(32),
          timeout: 60000,
          userVerification: 'required',
          rpId: window.location.hostname,
        }
      });
      if(cred) { setPinLocked(false); setPinInput(''); setPinAttempts(0); setPinError(''); }
    } catch(e) {
      if(e.name !== 'NotAllowedError') setPinError('Fingerprint failed. Use PIN instead.');
    }
  };

  const handleDisablePin = () => {
    const uid2 = uid() || 'demo-user';
    pinStore.del(`bp_pin_${uid2}`);
    pinStore.set(`bp_pin_enabled_${uid2}`, 'false');
    pinStore.set(`bp_fp_enabled_${uid2}`, 'false');
    setPinEnabled(false); setFingerprintEnabled(false); setPinLocked(false);
  };

  const handleToggleFingerprint = (val) => {
    const uid2 = uid() || 'demo-user';
    pinStore.set(`bp_fp_enabled_${uid2}`, val ? 'true' : 'false');
    setFingerprintEnabled(val);
  };

  // ── Load session on mount ──────────────────────────────────────────────────
  useEffect(() => {
    (async () => {
      // Detect artifact environment — window.storage exists but fetch to Supabase is blocked
      const isArtifact = typeof window.storage !== 'undefined' && typeof localStorage === 'undefined';

      if (isArtifact) {
        // In artifact: auto-enter demo mode, load any locally stored data
        const demoSession = {
          access_token: 'demo', refresh_token: 'demo',
          user: { id: 'demo-user', email: 'demo@budgetpro.app' }, isDemo: true,
        };
        setAuthSession(demoSession);

        // Load data from window.storage (persists across artifact refreshes)
        try {
          const [txR,glR,acR,catR,thR] = await Promise.all([
            window.storage.get('bp_transactions'), window.storage.get('bp_goals'),
            window.storage.get('bp_accounts'),     window.storage.get('bp_categories'),
            window.storage.get('bp_theme'),
          ]);
          const txns = txR ? JSON.parse(txR.value) : [];
          const gls  = glR ? JSON.parse(glR.value) : [];
          const accs = acR ? JSON.parse(acR.value) : [];
          const cats = catR ? JSON.parse(catR.value) : [];
          setTransactions([...txns].sort((a,b)=>new Date(b.date)-new Date(a.date)));
          setGoals(gls);
          setStorageAccounts(accs); applyAccounts(accs);
          setStorageCategories(cats); applyCategories(cats);
          if(thR) {
            const th = JSON.parse(thR.value);
            setThemeAccent(th.accent||'navy'); setThemeFontSize(th.fontSize||'medium');
            setThemeCardStyle(th.cardStyle||'rounded'); setThemeDarkMode(th.darkMode||false);
          }
        } catch {}
        setLoading(false);
        return;
      }

      // GitHub Pages / real browser — try Supabase session
      try {
        const stored = await sessionStore.get('bp_session');
        if(stored) {
          const session = JSON.parse(stored);
          if(session.isDemo) {
            setAuthSession(session);
            setLoading(false);
            return;
          }
          const refreshed = await sbRefreshToken(session.refresh_token);
          if(refreshed && refreshed.access_token) {
            const newSession = {...session, ...refreshed};
            await sessionStore.set('bp_session', JSON.stringify(newSession));
            // Check if PIN is enabled for this user
            const uid2 = newSession.user?.id || '';
            const pinOn = localStorage.getItem(`bp_pin_enabled_${uid2}`) === 'true';
            if(pinOn) {
              // Load PIN settings and show PIN screen — skip email login
              const fpOn = localStorage.getItem(`bp_fp_enabled_${uid2}`) === 'true';
              setAuthSession(newSession);
              setPinEnabled(true);
              setFingerprintEnabled(fpOn);
              setPinLocked(true);
              if(window.PublicKeyCredential) {
                window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable?.()
                  .then(avail => setFingerprintAvail(!!avail)).catch(()=>{});
              }
              await loadUserData(newSession);
              return;
            }
            // No PIN — load data and show app normally
            setAuthSession(newSession);
            await loadUserData(newSession);
            return;
          }
        }
      } catch {}
      setLoading(false);
    })();
  }, [applyAccounts, applyCategories]);

  // ── Save theme on change ───────────────────────────────────────────────────
  useEffect(() => {
    if(loading || !authSession) return;
    const theme = {accent:themeAccent,fontSize:themeFontSize,cardStyle:themeCardStyle,darkMode:themeDarkMode};
    if(authSession.isDemo) {
      try { window.storage.set('bp_theme', JSON.stringify(theme)); } catch {}
    } else {
      sbSave('settings', uid(), token(), theme).catch(()=>{});

  }, [themeAccent,themeFontSize,themeCardStyle,themeDarkMode,loading]);

  // ── Dashboard computation ──────────────────────────────────────────────────
  const dashboardStats = useMemo(() => {
    const res = {
      currentInflow:0, currentOutflow:0, totalBalance:0, accountBalances:{},
      expenseByCategory:[], incomeByCategory:[], trendData:[],
      modalInflow:0, modalOutflow:0, modalTrendData:[], modalByClass:{Need:0,Want:0},
      modalCategoryBuckets:{}, modalAvailableCategories:[], modalBucketLabels:[],
      modalIncomeInflow:0, modalIncomeTrendData:[], modalIncomeCategoryBuckets:{},
      modalIncomeAvailableCategories:[], modalIncomeBucketLabels:[]
    };
    const now=new Date(), Y=now.getFullYear(), M=now.getMonth(), D=now.getDate();
    customAccounts.forEach(a=>res.accountBalances[a]=accountsData[a]?.initialBalance||0);

    // Trend buckets
    const buckets=[];
    if (trendTimeRange==='weekly') {
      [['W1',1,7],['W2',8,14],['W3',15,21],['W4+',22,31]].forEach(([l,s,e])=>
        buckets.push({label:l,income:0,expense:0,start:new Date(Y,M,s),end:new Date(Y,M,e,23,59,59)}));
    } else if (trendTimeRange==='monthly') {
      for(let i=5;i>=0;i--){const d=new Date(Y,M-i,1);buckets.push({label:MONTHS[d.getMonth()].substring(0,3),income:0,expense:0,start:d,end:new Date(d.getFullYear(),d.getMonth()+1,0)});}
    } else {
      for(let i=3;i>=0;i--){const y=Y-i;buckets.push({label:y.toString(),income:0,expense:0,start:new Date(y,0,1),end:new Date(y,11,31)});}
    }

    // Modal buckets
    const getModalBuckets=()=>{
      const b=[];
      if(modalTimeRange==='daily'){for(let i=6;i>=0;i--){const d=new Date(Y,M,D-i);d.setHours(0,0,0,0);b.push({label:d.getDate().toString(),income:0,expense:0,start:d,end:new Date(d.getTime()+86399999)});}}
      else if(modalTimeRange==='weekly'){[['W1',1,7],['W2',8,14],['W3',15,21],['W4+',22,31]].forEach(([l,s,e])=>b.push({label:l,income:0,expense:0,start:new Date(Y,M,s),end:new Date(Y,M,e,23,59,59)}));}
      else if(modalTimeRange==='monthly'){for(let i=5;i>=0;i--){const d=new Date(Y,M-i,1);b.push({label:MONTHS[d.getMonth()].substring(0,3),income:0,expense:0,start:d,end:new Date(d.getFullYear(),d.getMonth()+1,0)});}}
      else if(modalTimeRange==='yearly'){for(let i=3;i>=0;i--){const y=Y-i;b.push({label:y.toString(),income:0,expense:0,start:new Date(y,0,1),end:new Date(y,11,31)});}}
      else if(modalTimeRange==='custom'){const s=new Date(modalCustomStart);s.setHours(0,0,0,0);const e=new Date(modalCustomEnd);e.setHours(23,59,59);const diff=Math.ceil((e-s)/86400000);if(diff<=31){for(let i=0;i<=diff;i++){const d=new Date(s.getTime()+i*86400000);b.push({label:d.getDate().toString(),income:0,expense:0,start:new Date(d),end:new Date(d.getTime()+86399999)});}}else{let tmp=new Date(s);while(tmp<=e){const ms=new Date(tmp.getFullYear(),tmp.getMonth(),1),me=new Date(tmp.getFullYear(),tmp.getMonth()+1,0,23,59,59);b.push({label:MONTHS[tmp.getMonth()].substring(0,3),income:0,expense:0,start:ms,end:me});tmp.setMonth(tmp.getMonth()+1);}}}
      return b;
    };
    const modalBuckets=getModalBuckets();
    const modalLimitS=modalBuckets[0]?.start, modalLimitE=modalBuckets[modalBuckets.length-1]?.end;

    // Income modal buckets
    const getIncomeBuckets=()=>{
      const b=[];
      if(modalIncomeTimeRange==='daily'){for(let i=6;i>=0;i--){const d=new Date(Y,M,D-i);d.setHours(0,0,0,0);b.push({label:d.getDate().toString(),income:0,expense:0,start:d,end:new Date(d.getTime()+86399999)});}}
      else if(modalIncomeTimeRange==='weekly'){[['W1',1,7],['W2',8,14],['W3',15,21],['W4+',22,31]].forEach(([l,s,e])=>b.push({label:l,income:0,expense:0,start:new Date(Y,M,s),end:new Date(Y,M,e,23,59,59)}));}
      else if(modalIncomeTimeRange==='monthly'){for(let i=5;i>=0;i--){const d=new Date(Y,M-i,1);b.push({label:MONTHS[d.getMonth()].substring(0,3),income:0,expense:0,start:d,end:new Date(d.getFullYear(),d.getMonth()+1,0)});}}
      else if(modalIncomeTimeRange==='yearly'){for(let i=3;i>=0;i--){const y=Y-i;b.push({label:y.toString(),income:0,expense:0,start:new Date(y,0,1),end:new Date(y,11,31)});}}
      else if(modalIncomeTimeRange==='custom'){const s=new Date(modalIncomeCustomStart);s.setHours(0,0,0,0);const e=new Date(modalIncomeCustomEnd);e.setHours(23,59,59);const diff=Math.ceil((e-s)/86400000);if(diff<=31){for(let i=0;i<=diff;i++){const d=new Date(s.getTime()+i*86400000);b.push({label:d.getDate().toString(),income:0,expense:0,start:new Date(d),end:new Date(d.getTime()+86399999)});}}else{let tmp=new Date(s);while(tmp<=e){const ms=new Date(tmp.getFullYear(),tmp.getMonth(),1),me=new Date(tmp.getFullYear(),tmp.getMonth()+1,0,23,59,59);b.push({label:MONTHS[tmp.getMonth()].substring(0,3),income:0,expense:0,start:ms,end:me});tmp.setMonth(tmp.getMonth()+1);}}}
      return b;
    };
    const incomeBuckets=getIncomeBuckets();
    const incomeLimitS=incomeBuckets[0]?.start, incomeLimitE=incomeBuckets[incomeBuckets.length-1]?.end;

    // Income breakdown window (main dashboard)
    let incBrkS,incBrkE;
    if(incomeTimeRange==='today'){incBrkS=new Date(Y,M,D);incBrkS.setHours(0,0,0,0);incBrkE=new Date(Y,M,D,23,59,59);}
    else if(incomeTimeRange==='weekly'){
      if(D<=7){incBrkS=new Date(Y,M,1);incBrkE=new Date(Y,M,7,23,59,59);}
      else if(D<=14){incBrkS=new Date(Y,M,8);incBrkE=new Date(Y,M,14,23,59,59);}
      else if(D<=21){incBrkS=new Date(Y,M,15);incBrkE=new Date(Y,M,21,23,59,59);}
      else{incBrkS=new Date(Y,M,22);incBrkE=new Date(Y,M+1,0,23,59,59);}
    } else if(incomeTimeRange==='monthly'){incBrkS=new Date(Y,M,1);incBrkE=new Date(Y,M+1,0,23,59,59);}
    else{incBrkS=new Date(Y,0,1);incBrkE=new Date(Y,11,31,23,59,59);}

    let brkS,brkE;
    if(expenseTimeRange==='today'){brkS=new Date(Y,M,D);brkS.setHours(0,0,0,0);brkE=new Date(Y,M,D,23,59,59);}
    else if(expenseTimeRange==='weekly'){
      if(D<=7){brkS=new Date(Y,M,1);brkE=new Date(Y,M,7,23,59,59);}
      else if(D<=14){brkS=new Date(Y,M,8);brkE=new Date(Y,M,14,23,59,59);}
      else if(D<=21){brkS=new Date(Y,M,15);brkE=new Date(Y,M,21,23,59,59);}
      else{brkS=new Date(Y,M,22);brkE=new Date(Y,M+1,0,23,59,59);}
    } else if(expenseTimeRange==='monthly'){brkS=new Date(Y,M,1);brkE=new Date(Y,M+1,0,23,59,59);}
    else{brkS=new Date(Y,0,1);brkE=new Date(Y,11,31,23,59,59);}

    const rangeStart=buckets[0]?.start, expGroups={}, incGroups={};
    let preInc=0, preExp=0;
    const modalCatBuckets={}, incomeCatBuckets={};

    [...transactions].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(t=>{
      const amt=parseFloat(t.amount)||0, tD=new Date(t.date);
      const bkt=buckets.find(b=>tD>=b.start&&tD<=b.end);
      if(bkt){if(t.type==='Income')bkt.income+=amt;else if(t.type==='Expense')bkt.expense+=amt;}
      else if(rangeStart&&tD<rangeStart){if(t.type==='Income')preInc+=amt;else if(t.type==='Expense')preExp+=amt;}

      // Expense modal buckets
      const mbIdx=modalBuckets.findIndex(b=>tD>=b.start&&tD<=b.end);
      if(mbIdx!==-1){
        if(t.type==='Income')modalBuckets[mbIdx].income+=amt;
        else if(t.type==='Expense'){
          modalBuckets[mbIdx].expense+=amt;
          const cat=t.category||'(uncategorised)';
          if(!modalCatBuckets[cat])modalCatBuckets[cat]=new Array(modalBuckets.length).fill(0);
          modalCatBuckets[cat][mbIdx]+=amt;
        }
      }

      // Income modal buckets
      const ibIdx=incomeBuckets.findIndex(b=>tD>=b.start&&tD<=b.end);
      if(ibIdx!==-1&&t.type==='Income'){
        incomeBuckets[ibIdx].income+=amt;
        const cat=t.category||'(uncategorised)';
        if(!incomeCatBuckets[cat])incomeCatBuckets[cat]=new Array(incomeBuckets.length).fill(0);
        incomeCatBuckets[cat][ibIdx]+=amt;
      }

      if(tD>=brkS&&tD<=brkE){
        if(t.type==='Income'){/* expense window only tracks expense inflow for balance card */}
        else if(t.type==='Expense'){res.currentOutflow+=amt;expGroups[t.category]=(expGroups[t.category]||0)+amt;}
      }
      if(tD>=incBrkS&&tD<=incBrkE){
        if(t.type==='Income'){res.currentInflow+=amt; incGroups[t.category]=(incGroups[t.category]||0)+amt;}
      }

      if(modalLimitS&&tD>=modalLimitS&&tD<=modalLimitE){
        if(t.type==='Income')res.modalInflow+=amt;
        else if(t.type==='Expense'){
          res.modalOutflow+=amt;
          const cat=customCategories.find(c=>c.name===t.category);
          if(cat?.class==='Need')res.modalByClass.Need+=amt;
          else if(cat?.class==='Want')res.modalByClass.Want+=amt;
        }
      }

      if(incomeLimitS&&tD>=incomeLimitS&&tD<=incomeLimitE&&t.type==='Income'){
        res.modalIncomeInflow+=amt;
      }

      if(t.type==='Income'&&t.paymentMethod) res.accountBalances[t.paymentMethod]=(res.accountBalances[t.paymentMethod]||0)+amt;
      else if(t.type==='Expense'&&t.paymentMethod) res.accountBalances[t.paymentMethod]=(res.accountBalances[t.paymentMethod]||0)-amt;
      else if(t.type==='Savings'||(t.type==='Transfer'&&t.purpose==='Saving')){const a=t.paymentMethod||t.accFrom;if(a)res.accountBalances[a]=(res.accountBalances[a]||0)-amt;}
      else if(t.type==='Transfer'){if(t.accFrom)res.accountBalances[t.accFrom]=(res.accountBalances[t.accFrom]||0)-amt;if(t.accTo)res.accountBalances[t.accTo]=(res.accountBalances[t.accTo]||0)+amt;}
    });

    if(trendValueType==='cumulative'){let ri=preInc,re=preExp;buckets.forEach(b=>{ri+=b.income;re+=b.expense;b.income=ri;b.expense=re;});}

    const finalMB=JSON.parse(JSON.stringify(modalBuckets));
    if(modalValueType==='cumulative'){let re=0;finalMB.forEach(b=>{re+=b.expense;b.expense=re;});}

    const finalCatBuckets={};
    Object.entries(modalCatBuckets).forEach(([cat,vals])=>{
      if(modalValueType==='cumulative'){let r=0;finalCatBuckets[cat]=vals.map(v=>{r+=v;return r;});}
      else finalCatBuckets[cat]=[...vals];
    });

    const modalAvailableCategories=Object.entries(modalCatBuckets)
      .map(([name,vals])=>({name,total:vals.reduce((s,v)=>s+v,0)}))
      .filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

    // Income modal cumulative + available categories
    const finalIB=JSON.parse(JSON.stringify(incomeBuckets));
    if(modalIncomeValueType==='cumulative'){let ri=0;finalIB.forEach(b=>{ri+=b.income;b.income=ri;});}

    const finalIncomeCatBuckets={};
    Object.entries(incomeCatBuckets).forEach(([cat,vals])=>{
      if(modalIncomeValueType==='cumulative'){let r=0;finalIncomeCatBuckets[cat]=vals.map(v=>{r+=v;return r;});}
      else finalIncomeCatBuckets[cat]=[...vals];
    });

    const modalIncomeAvailableCategories=Object.entries(incomeCatBuckets)
      .map(([name,vals])=>({name,total:vals.reduce((s,v)=>s+v,0)}))
      .filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

    res.totalBalance=Object.values(res.accountBalances).reduce((a,b)=>a+b,0);

    // Goal committed = all saving transactions linked to a goal that still exists (active or completed, not deleted)
    const activeGoalIds = new Set(goals.map(g=>g.id));
    res.goalCommitted = transactions
      .filter(t=>(t.type==='Transfer'&&t.purpose==='Saving')&&t.goalId&&activeGoalIds.has(t.goalId))
      .reduce((s,t)=>s+(parseFloat(t.amount)||0),0);

    res.availableBalance = res.totalBalance - res.goalCommitted;
    res.expenseByCategory=Object.entries(expGroups).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
    res.incomeByCategory=Object.entries(incGroups).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
    res.trendData=buckets;
    res.modalTrendData=finalMB;
    res.modalCategoryBuckets=finalCatBuckets;
    res.modalAvailableCategories=modalAvailableCategories;
    res.modalBucketLabels=modalBuckets.map(b=>b.label);
    res.modalIncomeTrendData=finalIB;
    res.modalIncomeCategoryBuckets=finalIncomeCatBuckets;
    res.modalIncomeAvailableCategories=modalIncomeAvailableCategories;
    res.modalIncomeBucketLabels=incomeBuckets.map(b=>b.label);
    return res;
  }, [transactions,accountsData,customAccounts,trendTimeRange,expenseTimeRange,trendValueType,
      incomeTimeRange,
      modalTimeRange,modalValueType,modalCustomStart,modalCustomEnd,customCategories,
      modalIncomeTimeRange,modalIncomeValueType,modalIncomeCustomStart,modalIncomeCustomEnd,
      goals]);

  const processedGoals = useMemo(()=>
    goals.map(g=>{
      const contrib=transactions.filter(t=>t.goalId===g.id&&(t.type==='Savings'||(t.type==='Transfer'&&t.purpose==='Saving'))).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
      const cur=(parseFloat(g.initialAmount)||0)+contrib;
      return{...g,currentAmount:cur,progress:Math.min((cur/(parseFloat(g.target)||1))*100,100)};
    }),[goals,transactions]);

  const activeGoals    = useMemo(()=>processedGoals.filter(g=>!g.completed),[processedGoals]);
  const completedGoals = useMemo(()=>processedGoals.filter(g=>g.completed),[processedGoals]);

  const goalHistoryData = useMemo(()=>{
    if(!historyGoalId) return {buckets:[],totalSaved:0,contributions:[]};
    const goal=goals.find(g=>g.id===historyGoalId);
    if(!goal) return {buckets:[],totalSaved:0,contributions:[]};
    const now=new Date(),Y=now.getFullYear(),M=now.getMonth();
    const contribs=transactions
      .filter(t=>t.goalId===historyGoalId&&(t.type==='Savings'||(t.type==='Transfer'&&t.purpose==='Saving')))
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    const getBuckets=()=>{
      const b=[];
      if(historyTimeRange==='weekly'){
        [['W1',1,7],['W2',8,14],['W3',15,21],['W4+',22,31]].forEach(([l,s,e])=>
          b.push({label:l,amount:0,cumulative:0,start:new Date(Y,M,s),end:new Date(Y,M,e,23,59,59)}));
      } else if(historyTimeRange==='monthly'){
        for(let i=5;i>=0;i--){const d=new Date(Y,M-i,1);b.push({label:MONTHS[d.getMonth()].substring(0,3),amount:0,cumulative:0,start:d,end:new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59)});}
      } else {
        for(let i=3;i>=0;i--){const y=Y-i;b.push({label:y.toString(),amount:0,cumulative:0,start:new Date(y,0,1),end:new Date(y,11,31,23,59,59)});}
      }
      return b;
    };
    const buckets=getBuckets();
    contribs.forEach(t=>{
      const tD=new Date(t.date);
      const bkt=buckets.find(b=>tD>=b.start&&tD<=b.end);
      if(bkt) bkt.amount+=(parseFloat(t.amount)||0);
    });
    let running=parseFloat(goal.initialAmount)||0;
    buckets.forEach(b=>{running+=b.amount;b.cumulative=running;});
    const totalSaved=(parseFloat(goal.initialAmount)||0)+contribs.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
    return {buckets,totalSaved,contributions:contribs};
  },[historyGoalId,historyTimeRange,transactions,goals]);



  const negativeBalanceWarning = useMemo(()=>{
    if(!formData.amount)return null;
    const amt=parseFloat(formData.amount);

  const saveAccountInfo = async () => {
    if(!showAccModal) return;
    const newName = accEditName.trim();
    if(!newName) return;
    const userBalance = parseFloat(accEditBalance);
    if(isNaN(userBalance)) return;

    // Compute how much transactions have already moved this account
    const storedInitial = accountsData[showAccModal]?.initialBalance ?? 0;
    const computedTotal = dashboardStats.accountBalances[showAccModal] ?? 0;
    const txEffect      = computedTotal - storedInitial;   // net from all transactions
    const reqInitial    = userBalance - txEffect;           // so that reqInitial + txEffect = userBalance

    let newAccs = [...storageAccounts];

    if (newName !== showAccModal) {
      // Rename — hide old, create new
      newAccs = newAccs.map(a => a.id === showAccModal ? {...a, hidden:true} : a);
      const exists = newAccs.find(a => a.id === newName);
      if (exists) newAccs = newAccs.map(a => a.id === newName ? {...a, initialBalance:reqInitial, description:accEditDescription, icon:accEditIcon, color:accEditColor, hidden:false} : a);
      else newAccs.push({id:newName, initialBalance:reqInitial, description:accEditDescription, icon:accEditIcon, color:accEditColor, hidden:false});
    } else {
      // Same name — upsert
      const exists = newAccs.find(a => a.id === showAccModal);
      if (exists) newAccs = newAccs.map(a => a.id === showAccModal ? {...a, initialBalance:reqInitial, description:accEditDescription, icon:accEditIcon, color:accEditColor} : a);

                                    const val=(dashboardStats.modalCategoryBuckets[cat]||[])[bi]||0;

                            <path d={d.map((x,i)=>`${i===0?'M':'L'} ${gx(i)} ${gy(x.expense||0,maxV)}`).join(' ')} fill="none" stroke="#f43f5e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

                        </div>
                      );

                          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full overflow-visible">

                                <path d={vals.map((v,i)=>`${i===0?'M':'L'} ${gx(i)} ${gy(v,maxV)}`).join(' ')} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

                        </div>

                <div className="bg-slate-50 p-5 rounded-[28px] border border-slate-100 mb-8 min-h-[160px] flex items-center">
                  {contributions.length===0?(
                    <div className="w-full text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-widest">No contributions yet</div>
                  ):historyChartType==='bar'?(
                    <div className="w-full space-y-3 animate-in fade-in duration-500">
                      <div className="flex items-end justify-between h-36 gap-1.5 px-1 pt-2">
                        {buckets.map((b,i)=>(
                          <div key={i} className="flex-1 flex flex-col items-center gap-1.5 h-full justify-end min-w-0">
                            <div className="w-full flex items-end justify-center h-full">
                              <div className="w-full max-w-[28px] rounded-t-lg transition-all duration-700"
                                style={{height:`${Math.max((b.amount/maxAmt)*100,b.amount>0?3:0)}%`,backgroundColor:col.icon,opacity:b.amount>0?1:0.15}}/>
                            </div>
                            <span className="text-[8px] font-black text-slate-400 uppercase tracking-tighter truncate w-full text-center">{b.label}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ):(
                    <div className="w-full space-y-2 animate-in fade-in duration-500">
                      <div className="h-36 w-full">
                        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full overflow-visible">
                          {[0,.25,.5,.75,1].map((p,i)=>(
                            <line key={i} x1={P} y1={gyC(maxCum*p)} x2={W-P} y2={gyC(maxCum*p)} stroke="#f1f5f9" strokeWidth="1"/>
                          ))}
                          <path d={buckets.map((b,i)=>`${i===0?'M':'L'} ${gx(i)} ${gyC(b.cumulative||0)}`).join(' ')}
                            fill="none" stroke={col.icon} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                          {buckets.map((b,i)=>(
                            <circle key={i} cx={gx(i)} cy={gyC(b.cumulative||0)} r="3.5" fill="white" stroke={col.icon} strokeWidth="2"/>
                          ))}
                        </svg>
                      </div>
                      <div className="flex justify-between px-2">
                        {buckets.map((b,i)=><span key={i} className="text-[8px] font-black text-slate-400 uppercase tracking-tighter">{b.label}</span>)}
                      </div>
                    </div>
                  )}
                </div>

                {/* Contribution log */}
                <div className="space-y-2">
                  <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-3">Contribution Log</h3>
                  {contributions.length===0?(
                    <div className="text-center py-6 text-slate-400 text-xs font-bold uppercase tracking-widest">No contributions yet</div>
                  ):[...contributions].reverse().map((t,i)=>(
                    <div key={i} className="flex items-center justify-between p-3 rounded-2xl" style={{backgroundColor:col.bg}}>
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-xl flex items-center justify-center shrink-0" style={{backgroundColor:col.icon}}>
                          <PiggyBank size={14} color="white"/>
                        </div>
                        <div>
                          <div className="text-xs font-bold text-slate-700">{t.description||'Saving contribution'}</div>
                          <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{new Date(t.date).toLocaleDateString()}</div>
                        </div>
                      </div>
                      <span className="text-sm font-black" style={{color:col.icon}}>+{formatCurrency(parseFloat(t.amount))}</span>
                    </div>
                  ))}
                </div>

                <button onClick={()=>setShowGoalHistory(false)} className="w-full mt-8 py-5 bg-slate-900 text-white rounded-3xl font-black uppercase tracking-widest text-[11px] shadow-xl active:scale-95 transition-all">Close</button>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

    </script>
  </body>
</html>
